<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Recursive:wght@300..1000&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/a38f295f99.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List App</title>
</head>

<body>
    <div class="container">
        <div class="todo-app">
            <h1>Aufgabenliste</h1>
            <form class="input-area">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <button type="button" id="add-task-btn">＋</button>
            </form>
            <div class="todos-container">
                <ul id="task-list">

                </ul>
                <p class="completed-message">All tasks completed!</p>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
